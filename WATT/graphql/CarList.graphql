
query brandListAll {
  carList(size: 12, page: 0) {
    id
    naming {
      make
      model
    }
    media {
      brand {
        id
        type
        thumbnail_url
        thumbnail_height
        thumbnail_width
      }
    }
  }
}

query modelListAll($brandName: String!) {
  carList(search: $brandName) {
    id
    naming {
      make
      model
      version
    }
    media {
      brand {
        id
        type
        url
        height
        width
      }
    }
  }
}

query carDetails($vehicleId: ID!) {
  vehicle(id: $vehicleId) {
    id
    naming {
      make
      model
      version
    }
    connectors {
      standard
    }
    battery {
      usable_kwh
      full_kwh
    }
    body {
      seats
      weight {
        nominal
      }
      width
      height
    }
    performance {
      acceleration
      top_speed
    }
    range {
      provider
      provider_is_estimated
      worst{
        highway
        city
        combined
      }
      best {
        highway
        city
        combined
      }
      chargetrip_range {
        best
        worst
      }
    }
    media {
      image {
        id
        type
        url
        height
        width
      }
        make {
        id
        type
        url
        height
        width
      }
    }
  }
}
